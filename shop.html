<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop | Онлайн дэлгүүр</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<img src="images/shoe.jpg" alt="test" style="width:300px;">

<body class="welcome-body">
  <!-- Animated background -->
  <div class="animated-bg">
    <span></span><span></span><span></span>
    <span></span><span></span><span></span>
  </div>

  <!-- NAVBAR -->
  <header class="welcome-nav">
    <div class="brand">
      <div class="brand-logo">O</div>
      <div>
        <h2>Online Shop</h2>
        <p>Premium Store</p>
      </div>
    </div>

    <nav class="welcome-nav-links">
      <a href="index.html">Welcome</a>
      <a href="cart.html">Cart</a>
      <a href="user-login.html">Login</a>
      <a href="register.html">Register</a>
      
    </nav>
  </header>

  <!-- MAIN -->
  <main class="welcome-page">
    <div class="premium-card" style="width:100%; max-width:1200px;">

      <h1 style="margin-bottom:20px;">🛍 Дэлгүүр</h1>

      <p id="welcomeUser" style="margin-bottom:20px;"></p>

      <!-- SEARCH -->
      <div class="actions search-wrap" style="margin-bottom:20px;">
        <input
          type="text"
          id="searchInput"
          placeholder="Бараа хайх..."
          oninput="filterProducts()"
        />
      </div>

      <!-- PRODUCTS -->
      <section class="grid" id="productList"></section>

    </div>
  </main>

  <script src="js/app.js"></script>
