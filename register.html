<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="welcome-body">
  <div class="animated-bg">
    <span></span><span></span><span></span><span></span><span></span><span></span>
  </div>

  <header class="welcome-nav">
    <div class="brand">
      <div class="brand-logo">O</div>
      <div>
        <h2>Online Shop</h2>
        <p>Create Your Account</p>
      </div>
    </div>

    <nav class="welcome-nav-links">
      <a href="index.html">Welcome</a>
      <a href="shop.html">Shop</a>
      <a href="user-login.html">Login</a>
    </nav>
  </header>

  <main class="auth-page">
    <form class="form-card premium-card" onsubmit="registerUser(event)">
      <p class="welcome-kicker">CREATE ACCOUNT</p>
      <h1>Бүртгүүлэх</h1>
      <p class="welcome-subtitle">Шинэ аккаунт үүсгээд худалдан авалтаа эхлүүлээрэй.</p>

      <input id="name" type="text" placeholder="Нэр" required />
      <input id="email" type="email" placeholder="И-мэйл" required />
      <input id="password" type="password" placeholder="Нууц үг" required />

      <button type="submit">Create Account</button>

      <div class="actions">
        <a class="link-btn secondary full" href="user-login.html">Login</a>
        <a class="link-btn ghost-btn full" href="shop.html">Shop руу орох</a>
      </div>
    </form>
  </main>

  <script>
    async function registerUser(event) {
      event.preventDefault();

      const payload = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
      };

      const res = await fetch("/api/user/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      if (res.ok) {
        alert("Бүртгэл амжилттай. Одоо нэвтэрнэ үү.");
        window.location.href = "user-login.html";
      } else {
        alert(data.error || "Бүртгэхэд алдаа гарлаа");
      }
    }
  </script>
</body>
</html>
